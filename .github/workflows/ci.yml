name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project managment-company.xcodeproj \
            -scheme managment-company \
            -sdk iphonesimulator \
            -configuration Debug

      - name: Run tests
        run: |
          xcodebuild test \
            -project managment-company.xcodeproj \
            -scheme managment-company \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
